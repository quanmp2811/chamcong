<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDD | Bảng chấm công</title>
  <link rel="stylesheet" href="app.css" />
  <link rel="stylesheet" href="footer.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css" />
</head>
<body class="page-bang-cham-cong">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">Chấm công</a>
      <nav class="main-nav">
        <a href="index.html">Báo cáo</a>
        <a href="lich-lam-viec.html" class="active">Lịch làm việc</a>
        <a href="cau-hinh.html">Cấu hình</a>
      </nav>
      <a href="#" id="auth-button" class="button button-primary">Đăng nhập</a>
    </div>
  </header>

  <div class="schedule-container">
    <div class="sidebar app-sidepanel">
      <a href="lich-lam-viec.html" class="menu-item app-sidepanel-link">Lịch làm</a>
      <a href="bang-cham-cong.html" class="menu-item app-sidepanel-link active">Bảng chấm công</a>
      <a href="cham-cong-nhan-vien.html" class="menu-item app-sidepanel-link">Chấm công nhân viên</a>
    </div>

    <div class="schedule-main">
      <div class="schedule-overview">
        <div>
          <h1>Tổng Quan Lịch Chấm Công</h1>
          <p>Theo dõi trạng thái chấm công theo cửa hàng trong tháng đã chọn.</p>
        </div>
        <label class="schedule-filter" for="schedule-month">
          Tháng
          <span class="schedule-filter-picker">
            <input type="text" id="schedule-month" name="schedule-month" placeholder="Chọn tháng" />
          </span>
        </label>
      </div>

      <div class="schedule-table-wrap">
        <table>
          <thead>
            <tr id="attendance-head-row">
              <th class="store">Cửa hàng</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 chấm công. Thiết kế bởi Phạm Mạnh Quân 0862528119.</p>
      <div class="footer-links">
        <a href="index.html">Trang chủ</a>
        <a href="#">Chính sách</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
  <script>
    const stores = [
      "JM - HCM05", "JM - HCM06", "JM - HCM08", "JM - HCM10",
      "JM - HCM11", "JM - HCM14", "JM - HDG01", "JM - HNI01",
      "JM - HNI02", "JM - HNI03", "JM - HNI06", "JM - HNI08",
      "JM - HNI10", "JM - HNI14", "JM - HNI15", "JM - HNI17",
      "JM - HNI21", "JM - HNI22", "JM - HP01", "JM - HUE01", "JM - NAN01"
    ];

    const tbody = document.getElementById("table-body");
    const attendanceHeadRow = document.getElementById("attendance-head-row");
    const scheduleMonthInput = document.getElementById("schedule-month");
    const now = new Date();
    const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
    const currentMonthLabel = `${String(now.getMonth() + 1).padStart(2, "0")}/${now.getFullYear()}`;

    function renderAttendanceHeader(daysInMonth) {
      attendanceHeadRow.innerHTML = '<th class="store">Cửa hàng</th>';
      for (let i = 1; i <= daysInMonth; i += 1) {
        attendanceHeadRow.innerHTML += `<th>${i}</th>`;
      }
    }

    function renderAttendanceTable(daysInMonth) {
      tbody.innerHTML = "";
      stores.forEach((store) => {
        let row = `<tr><td class="store">${store}</td>`;
        for (let i = 1; i <= daysInMonth; i += 1) {
          row += '<td class="x">✕</td>';
        }
        row += "</tr>";
        tbody.innerHTML += row;
      });
    }

    function updateAttendanceByMonth(value) {
      const [year, month] = value.split("/").reverse();
      if (!year || !month) return;
      const daysInMonth = new Date(Number(year), Number(month), 0).getDate();
      renderAttendanceHeader(daysInMonth);
      renderAttendanceTable(daysInMonth);
    }

    if (window.flatpickr && window.monthSelectPlugin) {
      flatpickr(scheduleMonthInput, {
        defaultDate: `${currentMonth}-01`,
        dateFormat: "m/Y",
        disableMobile: true,
        plugins: [
          monthSelectPlugin({
            shorthand: false,
            dateFormat: "m/Y",
            altFormat: "m/Y"
          })
        ],
        onReady: (_, dateStr) => updateAttendanceByMonth(dateStr || currentMonthLabel),
        onChange: (_, dateStr) => updateAttendanceByMonth(dateStr)
      });
    } else {
      scheduleMonthInput.value = currentMonthLabel;
      updateAttendanceByMonth(currentMonthLabel);
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
