  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>
  <script src="js/script.js"></script>
  <script type="module">
    import { getChamCong, getStores } from "./js/api.js";

    const tbody = document.getElementById("table-body");
    const attendanceHeadRow = document.getElementById("attendance-head-row");
    const scheduleMonthInput = document.getElementById("schedule-month");
    const now = new Date();
    const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
    const currentMonthLabel = `${String(now.getMonth() + 1).padStart(2, "0")}/${now.getFullYear()}`;

    let activeMonth = currentMonth;
    let stores = [];

    function toMonthValue(value) {
      if (!value) {
        return currentMonth;
      }

      if (value.includes("/")) {
        const [month, year] = value.split("/");
        return `${year}-${month}`;
      }

      return value.slice(0, 7);
    }

    function getDaysInMonth(monthValue) {
      const [year, month] = monthValue.split("-").map(Number);
      return new Date(year, month, 0).getDate();
    }

    function getStatusLabel(status) {
      if (status === "present") return "x";
      if (status === "leave_paid") return "P";
      if (status === "leave_unpaid") return "KP";
      return "✕";
    }

    function getCellClass(status) {
      if (status === "present") return "x";
      return "";
    }

    function buildStoreDayMap(records) {
      const map = new Map();

      records.forEach((record) => {
        const date = new Date(record.time);
        const day = date.getDate();
        const storeCode = record.ten;
        const key = `${storeCode}-${day}`;
        const currentStatus = map.get(key);

        if (record.status === "present" || !currentStatus) {
          map.set(key, record.status);
        }
      });

      return map;
    }

    function renderAttendanceHeader(daysInMonth) {
      attendanceHeadRow.innerHTML = '<th class="store">Cửa hàng</th>';

      for (let day = 1; day <= daysInMonth; day += 1) {
        attendanceHeadRow.innerHTML += `<th>${day}</th>`;
      }
    }

    function renderAttendanceTable(daysInMonth, records) {
      const storeDayMap = buildStoreDayMap(records);
      tbody.innerHTML = "";

      stores.forEach((store) => {
        let row = `<tr><td class="store">${store.code}</td>`;

        for (let day = 1; day <= daysInMonth; day += 1) {
          const status = storeDayMap.get(`${store.code}-${day}`) || "";
          row += `<td class="${getCellClass(status)}">${getStatusLabel(status)}</td>`;
        }

        row += "</tr>";
        tbody.innerHTML += row;
      });
    }

    async function loadData(monthValue) {
      activeMonth = monthValue;
      const daysInMonth = getDaysInMonth(monthValue);
      renderAttendanceHeader(daysInMonth);

      const [storeData, attendanceData] = await Promise.all([
        getStores(),
        getChamCong({ month: monthValue })
      ]);

      stores = [...storeData].sort((a, b) => a.code.localeCompare(b.code));
      renderAttendanceTable(daysInMonth, attendanceData);
    }

    function updateAttendanceByMonth(value) {
      const monthValue = toMonthValue(value);
      loadData(monthValue).catch((error) => {
        console.error("Cannot load attendance table:", error);
        tbody.innerHTML = '<tr><td class="store">Không tải được dữ liệu</td></tr>';
      });
    }

    if (window.flatpickr && window.monthSelectPlugin) {
      flatpickr(scheduleMonthInput, {
        defaultDate: `${currentMonth}-01`,
        dateFormat: "m/Y",
        disableMobile: true,
        plugins: [
          monthSelectPlugin({
            shorthand: false,
            dateFormat: "m/Y",
            altFormat: "m/Y"
          })
        ],
        onReady: (_, dateStr) => updateAttendanceByMonth(dateStr || currentMonthLabel),
        onChange: (_, dateStr) => updateAttendanceByMonth(dateStr)
      });
    } else {
      scheduleMonthInput.value = currentMonthLabel;
      updateAttendanceByMonth(currentMonthLabel);
    }

    scheduleMonthInput.addEventListener("change", () => {
      updateAttendanceByMonth(scheduleMonthInput.value);
    });

    window.addEventListener("attendance:ws-message", (event) => {
      if (event.detail?.type === "attendance:created") {
        loadData(activeMonth).catch((error) => {
          console.error("Cannot refresh attendance table:", error);
        });
      }
    });
  </script>
