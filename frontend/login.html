<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập | Chấm công</title>
  <link rel="icon" href="public/logo-jm-den.png" type="image/x-icon">

  <link rel="stylesheet" href="css/login.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    #rotate-overlay { display: none; position: fixed; inset: 0; z-index: 99999; background: #0a0f1e; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; color: #fff; text-align: center; padding: 2rem; }
    #rotate-overlay svg { width: 64px; height: 64px; color: #60a5fa; animation: rotate-hint 1.5s ease-in-out infinite alternate; }
    @keyframes rotate-hint { from { transform: rotate(-20deg); } to { transform: rotate(20deg); } }
    #rotate-overlay p { font-size: 1.1rem; font-weight: 500; opacity: 0.9; margin: 0; }
    @media (max-width: 768px) and (orientation: portrait) { #rotate-overlay { display: flex; } body > *:not(#rotate-overlay) { visibility: hidden; } }
  </style>
</head>

<body>
  <div id="rotate-overlay" aria-live="polite">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 22h8"/><path d="M12 18v0"/></svg>
    <p>Vui lòng xoay ngang điện thoại để xem lịch làm việc</p>
  </div>
  <div class="login-container">
    <div class="login-card login-card-google">
      <div class="card-accent"></div>

      <div class="login-header">
        <div class="logo">
          <img src="./public/logo-jm-den.png" alt="Logo Chấm công" style="height: 60px; width: auto; object-fit: contain;">
        </div>
        <h1>Đăng nhập</h1>
        <p>Chỉ hỗ trợ đăng nhập bằng Google</p>
      </div>

      <!-- GOOGLE LOGIN -->
      <div class="google-login-panel" id="loginPanel">
        <div id="g_id_onload"
          data-client_id="577666304664-smluon0s9gfgjgqlbrk6jqi0hdio2jib.apps.googleusercontent.com"
          data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin"
          data-type="standard"
          data-size="large">
        </div>
      </div>

      <!-- SUCCESS -->
      <div class="success-state" id="successMessage" style="display:none">
        <h3>Đăng nhập thành công</h3>
        <p>Đang chuyển...</p>
      </div>
    </div>
  </div>
  <script>
    // 🔥 nếu đã login thì không cho vào login nữa
    const existingToken = sessionStorage.getItem("token");
    let existingUser = null;
  
    try {
      existingUser = JSON.parse(sessionStorage.getItem("user"));
    } catch (e) {
      existingUser = null;
      sessionStorage.removeItem("user");
      sessionStorage.removeItem("token");
    }
  
    if (
      existingToken &&
      existingUser &&
      typeof existingUser.email === "string" &&
      existingUser.email.trim()
    ) {
      window.location.replace("/");
    }
  
    // 🔥 xử lý login Google
    async function handleCredentialResponse(response) {
      try {
        console.log("FULL RESPONSE:", response);
        console.log("TOKEN:", response.credential);
  
        // ❌ nếu không có token
        if (!response.credential) {
          throw new Error("Không nhận được token từ Google");
        }
  
        const res = await fetch("/api/auth/google", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token: response.credential // ✅ QUAN TRỌNG
          })
        });
  
        const data = await res.json();
  
        console.log("SERVER RESPONSE:", data);
  
        // ❌ nếu backend trả lỗi
        if (!res.ok) {
          throw new Error(data.message || "Đăng nhập thất bại");
        }
  
        // ❌ nếu thiếu token
        if (!data.token) {
          throw new Error("Server không trả về token");
        }
  
        // ✅ lưu token và user
        sessionStorage.setItem("token", data.token);
        sessionStorage.setItem("user", JSON.stringify(data.user));
  
        // 👉 UI
        document.getElementById("loginPanel").style.display = "none";
        document.getElementById("successMessage").style.display = "block";
  
        // 👉 chuyển trang
        setTimeout(() => {
          window.location.replace("/");
        }, 800);
  
      } catch (err) {
        console.error("LOGIN ERROR:", err);
        alert(err.message || "Lỗi đăng nhập");
      }
    }
  </script>
  <script src="js/script.js"></script>
</body>
</html>
