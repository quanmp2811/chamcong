<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập | Chấm công</title>
  <link rel="icon" href="public/logo-jm-den.png" type="image/x-icon">

  <link rel="stylesheet" href="css/login.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div class="login-container">
    <div class="login-card login-card-google">
      <div class="card-accent"></div>

      <div class="login-header">
        <div class="logo">
          <img src="./public/logo-jm-den.png" alt="Logo Chấm công" style="height: 60px; width: auto; object-fit: contain;">
        </div>
        <h1>Đăng nhập</h1>
        <p>Chỉ hỗ trợ đăng nhập bằng Google</p>
      </div>

      <!-- GOOGLE LOGIN -->
      <div class="google-login-panel" id="loginPanel">
        <div id="g_id_onload"
          data-client_id="577666304664-smluon0s9gfgjgqlbrk6jqi0hdio2jib.apps.googleusercontent.com"
          data-callback="handleCredentialResponse">
        </div>

        <div class="g_id_signin"
          data-type="standard"
          data-size="large">
        </div>
      </div>

      <!-- SUCCESS -->
      <div class="success-state" id="successMessage" style="display:none">
        <h3>Đăng nhập thành công</h3>
        <p>Đang chuyển...</p>
      </div>
    </div>
  </div>

  <script>
    // 🔥 nếu đã login thì không cho vào login nữa
    const existingToken = sessionStorage.getItem("token");
    let existingUser = null;

    try {
      existingUser = JSON.parse(sessionStorage.getItem("user"));
    } catch (e) {
      existingUser = null;
      sessionStorage.removeItem("user");
      sessionStorage.removeItem("token");
    }

    if (existingToken && existingUser && typeof existingUser.email === "string" && existingUser.email.trim()) {
      window.location.replace("/");
    }

    function handleCredentialResponse(response) {
      const token = response.credential;

      fetch("/api/auth/google", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token })
      })
      .then(async (res) => {
        const data = await res.json();

        // ❌ nếu không có quyền
        if (!res.ok) {
          throw new Error(data.message || "Không có quyền truy cập");
        }

        return data;
      })
      .then(data => {
        console.log("LOGIN OK:", data);

        // ✅ lưu token và user
        sessionStorage.setItem("token", data.token);
        sessionStorage.setItem("user", JSON.stringify(data.user));

        // 👉 UI
        document.getElementById("loginPanel").style.display = "none";
        document.getElementById("successMessage").style.display = "block";

        // 👉 chuyển trang
        setTimeout(() => {
          window.location.replace("/");
        }, 800);
      })
      .catch(err => {
        console.error(err);
        alert(err.message);
      });
    }
  </script>
  <script src="js/script.js"></script>
</body>
</html>
