<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chấm công | Người dùng</title>
  <link rel="icon" href="public/logo-jm-den.png" type="image/x-icon">

  <!-- dùng chung css -->
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/nav.css" />
  <link rel="stylesheet" href="./css/footer.css" />
  <link rel="stylesheet" href="./css/cau-hinh.css" />
</head>

<body class="page-cau-hinh">

  <!-- HEADER (GIỮ NGUYÊN) -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="public/logo-jm.ico" alt="Logo Chấm công" style="height: 40px;">
      </a>
      <nav class="main-nav">
        <a href="index.html">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="nav-label"> Lịch làm việc</span>
        </a>
        <a href="cau-hinh.html" class="active">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span class="nav-label"> Cấu hình</span>
        </a>
      </nav>
      <div class="user-info" id="user-info" style="display: none; flex-direction: column; align-items: flex-end;">
        <span id="user-name" style="font-weight: 500;"></span>
        <span id="user-role" style="font-size: 0.85em;"></span>
        <button id="logout-button" class="button button-secondary">Đăng xuất</button>
      </div>
    </div>
  </header>

  <main class="config-layout">

    <!-- SIDEBAR (CHUNG) -->
    <aside class="config-sidebar app-sidepanel">
      <a href="cau-hinh.html" class="config-nav-item app-sidepanel-link">Quản lý đơn vị</a>
      <a href="nguoi-dung.html" class="config-nav-item app-sidepanel-link active">Quản lý người dùng</a>
    </aside>

    <!-- MAIN -->
    <section class="config-main">
      <div class="config-shell">

        <article class="config-panel">
          <h2>Quản lý người dùng</h2>

          <!-- FORM -->
          <form id="user-form">
            <div class="store-form-grid">

              <div class="store-field">
                Email
                <input type="email" id="user-email" class="store-input" />
              </div>

              <div class="store-field">
                Họ tên
                <input type="text" id="user-fullname" class="store-input" />
              </div>

              <div class="store-field">
                Vai trò
                <select id="user-role-select" class="store-input">
                  <option value="admin">Admin</option>
                  <option value="user">Quản lý</option>
                </select>
              </div>

              <div class="store-field" id="store-field">
                Đơn vị
                <select id="user-store" class="store-input"></select>
              </div>

            </div>

            <div class="config-actions">
              <button type="submit" class="config-button primary">Thêm người dùng</button>
            </div>
          </form>

          <div id="user-status" class="config-status"></div>

          <!-- TABLE -->
          <table class="store-table">
            <thead>
              <tr>
                <th>Username</th>
                <th>Họ tên</th>
                <th>Vai trò</th>
                <th>Đơn vị</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="user-table"></tbody>
          </table>

        </article>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 chấm công</p>
    </div>
  </footer>

  <!-- SCRIPT -->
  <script type="module">

    import { getStores, getUsers, createUser, deleteUser, updateUser } from "./js/api.js";

    let users = [];
    let stores = [];
    let editingEmail = null;

    const form = document.getElementById("user-form");
    const table = document.getElementById("user-table");
    const storeSelect = document.getElementById("user-store");
    const roleSelect = document.getElementById("user-role-select");
    const storeField = document.getElementById("store-field");
    const status = document.getElementById("user-status");

    function updateStoreFieldVisibility() {
      if (!storeField) return;
      if (roleSelect.value === "admin") {
        storeSelect.value = "";
        storeSelect.disabled = true;
        storeField.style.display = "none";
      } else {
        storeSelect.disabled = false;
        storeField.style.display = "";
      }
    }

    // 🔥 khi đổi role
    roleSelect.addEventListener("change", updateStoreFieldVisibility);
    updateStoreFieldVisibility();
    // load store vào dropdown
    async function loadStoresUI() {
      try {
        const data = await getStores();
        stores = data;
        
        storeSelect.innerHTML = `
          <option value="">-- Chọn đơn vị --</option>
          ${stores.map(s => `
            <option value="${s.code}">${s.name}</option>
          `).join("")}
        `;
      } catch (e) {
        status.textContent = "Lỗi load stores";
      }
    }

    // load users
    async function loadUsers() {
      try {
        const data = await getUsers();
        users = data;
        render();
      } catch (e) {
        status.textContent = "Lỗi load users";
      }
    }

    // render table
    function render() {
    table.innerHTML = users.map(u => {
      const isEditing = editingEmail === u.email;
      
      if (isEditing) {
        return `
          <tr>
            <td>${u.email}</td>
            <td><input value="${u.name}" data-field="name" class="store-input" /></td>
            <td>
              <select data-field="role" class="store-input">
                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                <option value="user" ${u.role === 'user' ? 'selected' : ''}>Quản lý</option>
              </select>
            </td>
            <td ${u.role === 'admin' ? 'style="display:none"' : ''}>
              <select data-field="storeCode" class="store-input" ${u.role === 'admin' ? 'disabled' : ''}>
                <option value="">Không</option>
                ${stores.map(s => `<option value="${s.code}" ${u.storeCode === s.code ? 'selected' : ''}>${s.name}</option>`).join('')}
              </select>
            </td>
            <td>
              <button data-action="update" data-email="${u.email}">Lưu</button>
              <button data-action="cancel">Hủy</button>
            </td>
          </tr>
        `;
      }
      
      return `
        <tr>
          <td>${u.email}</td>
          <td>${u.name}</td>
          <td>${u.role === 'admin' ? 'Admin' : 'Quản lý'}</td>
          <td>${u.storeCode ?? ""}</td>
          <td>
            <button data-action="edit" data-email="${u.email}">Sửa</button>
            <button data-action="delete" data-email="${u.email}">Xóa</button>
          </td>
        </tr>
      `;
    }).join("");
    }

    // submit
    form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const storeValue = document.getElementById("user-store").value;
    const role = roleSelect.value;    
    const user = {
      email: document.getElementById("user-email").value.trim(),
      name: document.getElementById("user-fullname").value.trim(),
      role: role,
      storeCode: role === "admin" ? null : (storeValue || null)
    };
      if (!user.email || !user.name || !user.role) {
        status.textContent = "Nhập đầy đủ thông tin";
        return;
      }
    try {
      await createUser(user);
      await loadUsers();
      form.reset();
      status.textContent = "Đã thêm user";
      updateStoreFieldVisibility();
    } catch (err) {
      status.textContent = err.message;
    }
    });
    // delete, edit, update
    table.addEventListener("click", async (e) => {
      const btn = e.target;
      const action = btn.dataset.action;
      const email = btn.dataset.email;
      const row = btn.closest("tr");

      if (action === "edit") {
        editingEmail = email;
        render();
        return;
      }

      if (action === "cancel") {
        editingEmail = null;
        render();
        return;
      }

      if (action === "update") {
        const inputs = row.querySelectorAll("input");
        const roleSelect = row.querySelector("select[data-field='role']");
        const storeSelect = row.querySelector("select[data-field='storeCode']");

        const data = {
          name: inputs[0].value.trim(),
          role: roleSelect.value,
          storeCode: storeSelect.value || null
        };

        try {
          await updateUser(email, data);
          editingEmail = null;
          await loadUsers();
          status.textContent = "Đã cập nhật user";
        } catch (err) {
          status.textContent = err.message;
        }
        return;
      }

      if (action === "delete") {
        try {
          await deleteUser(email);
          await loadUsers();
          status.textContent = "Đã xóa user";
        } catch (err) {
          status.textContent = err.message;
        }
      }
    });

    // Handle role change in edit mode
    table.addEventListener("change", (e) => {
      const target = e.target;
      if (target.matches("select[data-field='role']")) {
        const row = target.closest("tr");
        const storeSelect = row.querySelector("select[data-field='storeCode']");
        const storeTd = storeSelect.closest("td");
        if (target.value === "admin") {
          storeSelect.value = "";
          storeSelect.disabled = true;
          storeTd.style.display = 'none';
        } else {
          storeSelect.disabled = false;
          storeTd.style.display = '';
        }
      }
    });

    await loadStoresUI();
    await loadUsers();

  </script>
  <script src="js/script.js"></script>
</body>
</html>
